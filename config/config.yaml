# Параметры генерации тестовых выгрузок кассового ПО

generation:
  shops: 5                          # количество магазинов (N)
  cash_registers_per_shop: [1, 4]   # диапазон количества касс в магазине
  receipts_per_cash_per_day: [15, 40]  # диапазон числа чеков на кассу в день
  items_per_receipt: [1, 6]         # диапазон числа позиций в чеке
  discount_probability: 0.3         # вероятность скидки на позицию
  discount_max_pct: 0.25            # максимальный процент скидки от суммы позиции
  price_jitter_pct: 0.15            # разброс цены вокруг базовой цены товара

paths:
  data_dir: data
  log_dir: logs
